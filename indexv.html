<title>365 Days For You 💜</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;

margin:0;
padding:30px;
text-align:center;
color:#4b3b7a;
scroll-behavior:smooth;
}

h1{
margin-bottom:5px;
}

.subtitle{
color:#7a6da8;
margin-bottom:30px;
}

.calendar{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(50px,1fr));
gap:10px;
max-width:760px;
margin:auto;
}

.day{
height:50px;
display:flex;
align-items:center;
justify-content:center;
border-radius:12px;
font-size:13px;
border:1px solid #e4dcff;
background:#e9e0ff;
color:#5a44c2;
cursor:pointer;
position:relative;
transition:transform .2s;
}

.day:hover{
transform:scale(1.1);
}

.day.locked{
opacity:.35;
cursor:not-allowed;
}

/* ribbon */

.day::before{
content:"";
position:absolute;
width:6px;
height:100%;
background:#c7b8ff;
left:50%;
transform:translateX(-50%);
}

.day::after{
content:"";
position:absolute;
height:6px;
width:100%;
background:#c7b8ff;
top:50%;
transform:translateY(-50%);
}

/* open animation */

.day.opening{
animation:openGift .6s ease forwards;
}

@keyframes openGift{

0%{
transform:scale(1);
background:#e9e0ff;
}

40%{
transform:scale(1.35) rotate(6deg);
background:#cbb8ff;
}

70%{
transform:scale(.9) rotate(-4deg);
background:#bda7ff;
}

100%{
transform:scale(1);
background:#9f85ff;
color:white;
}

}

/* viewer */

.viewer{
margin-top:40px;
max-width:620px;
margin-left:auto;
margin-right:auto;
padding:25px;
border-radius:16px;
background:white;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.card{
animation:cardReveal .7s ease;
}

@keyframes cardReveal{

0%{
opacity:0;
transform:translateY(30px) scale(.9);
}

100%{
opacity:1;
transform:translateY(0) scale(1);
}

}

.message{
margin-top:8px;
color:#6e61a8;
}

img{
width:100%;
border-radius:12px;
margin-top:15px;
}

</style>
</head>

/* start date */

const startDate=new Date("2026-03-20")
const today=new Date()

const diffDays=Math.floor(
(today-startDate)/(1000*60*60*24)
)

const calendar=document.getElementById("calendar")

for(let i=1;i<=365;i++){

let box=document.createElement("div")
box.classList.add("day")
box.innerText=i

if(i<=diffDays+1){

box.onclick=()=>openDay(i)

}else{

box.classList.add("locked")

box.onclick=()=>{
alert("⏳ patience Achintya.. 💜")
}

}

calendar.appendChild(box)

}

function openDay(day){

const boxes=document.querySelectorAll(".day")
const box=boxes[day-1]

box.classList.remove("opening")
void box.offsetWidth
box.classList.add("opening")

setTimeout(()=>{

const message=messages[day-1] || "More jokes coming soon 😄"


const viewer=document.getElementById("viewer")

viewer.innerHTML=
`
<div class="card">
<h3>Day ${day}</h3>
<div class="message">${message}</div>

</div>
`

viewer.scrollIntoView({behavior:"smooth"})

},500)

}
